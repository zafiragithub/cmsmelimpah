<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memuat...</title>
    
    <link rel="preconnect" href="https://script.google.com">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link id="dynamic-favicon" rel="icon" type="image/x-icon" href="">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-font-smoothing: antialiased; background-color: #f8fafc; }
        
        /* KANVAS LOADING SHEETFLARE STYLE */
        #loading-spinner {
            position: fixed; inset: 0; background-color: #f8fafc; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.4s ease;
        }
        .percentage-text {
            font-size: 6rem; font-weight: 900; color: #1e293b; line-height: 1; letter-spacing: -0.05em;
        }
        .progress-container {
            width: 240px; height: 6px; background-color: #e2e8f0; border-radius: 6px; margin-top: 24px; overflow: hidden;
        }
        .progress-bar {
            height: 100%; background-color: #4f46e5; width: 0%; transition: width 0.15s ease-out;
        }
    </style>
</head>
<body class="m-0 p-0 overflow-x-hidden selection:bg-indigo-500 selection:text-white">
    
    <div id="loading-spinner">
        <div id="loading-percentage" class="percentage-text">0%</div>
        <div class="text-xs font-bold text-slate-400 mt-3 uppercase tracking-widest animate-pulse">Menyiapkan Data...</div>
        <div class="progress-container">
            <div id="loading-bar" class="progress-bar"></div>
        </div>
    </div>

    <div id="app-canvas" class="w-full min-h-screen opacity-0 transition-opacity duration-500 hidden"></div>

    <div id="error-box" class="hidden min-h-screen flex flex-col items-center justify-center bg-slate-50 p-6">
        <div class="bg-white p-10 rounded-[2rem] shadow-xl text-center max-w-md border border-slate-100">
            <div class="w-20 h-20 bg-rose-50 text-rose-500 rounded-full flex items-center justify-center mx-auto mb-6">
                <i data-lucide="globe-2" class="w-10 h-10"></i>
            </div>
            <h2 class="text-2xl font-black text-slate-800 mb-3">Domain Belum Aktif</h2>
            <p class="text-slate-500 text-sm leading-relaxed">Website untuk domain ini tidak ditemukan atau sedang dalam proses pengaturan.</p>
        </div>
    </div>

    <script src="engine.js?v=sheetflare_100"></script>

</body>
</html>
