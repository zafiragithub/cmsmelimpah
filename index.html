<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memuat...</title>
    
    <link rel="preconnect" href="https://script.google.com">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link id="dynamic-favicon" rel="icon" type="image/x-icon" href="">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-font-smoothing: antialiased; background-color: #f8fafc; }
        
        /* KANVAS LOADING PREMIUM */
        #loading-spinner {
            position: fixed; inset: 0; background-color: #f0f4f8; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.5s ease;
        }
        
        /* CONTAINER CINCIN */
        .circle-container { position: relative; width: 150px; height: 150px; display: flex; align-items: center; justify-content: center; }
        .circle-svg { width: 100%; height: 100%; transform: rotate(-90deg); }
        .circle-bg { fill: none; stroke: #e2e8f0; stroke-width: 8; }
        
        /* CINCIN PROGRESS BERCAHAYA */
        .circle-progress { 
            fill: none; stroke: url(#gradient); stroke-width: 8; 
            stroke-dasharray: 283; stroke-dashoffset: 283; /* 283 adalah keliling lingkaran (2 * pi * r) */
            stroke-linecap: round; transition: stroke-dashoffset 0.15s ease-out;
            filter: drop-shadow(0 0 10px rgba(79, 70, 229, 0.6));
        }
        
        /* TEKS PERSENTASE DI TENGAH */
        .percentage-text { position: absolute; font-size: 2.2rem; font-weight: 900; color: #4f46e5; letter-spacing: -1px; }
    </style>
</head>
<body class="m-0 p-0 overflow-x-hidden selection:bg-indigo-500 selection:text-white">
    
    <div id="loading-spinner">
        <div class="circle-container">
            <svg class="circle-svg" viewBox="0 0 100 100">
                <defs>
                    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%" stop-color="#3b82f6" />
                        <stop offset="100%" stop-color="#8b5cf6" />
                    </linearGradient>
                </defs>
                <circle class="circle-bg" cx="50" cy="50" r="45" />
                <circle id="loading-circle" class="circle-progress" cx="50" cy="50" r="45" />
            </svg>
            <div id="loading-percentage" class="percentage-text">0%</div>
        </div>
        <div class="text-xs font-bold text-slate-400 mt-8 uppercase tracking-widest animate-pulse">Menyiapkan Data...</div>
    </div>

    <div id="app-canvas" class="w-full min-h-screen opacity-0 transition-opacity duration-500 hidden"></div>

    <div id="error-box" class="hidden min-h-screen flex flex-col items-center justify-center bg-slate-50 p-6">
        <div class="bg-white p-10 rounded-[2rem] shadow-xl text-center max-w-md border border-slate-100">
            <div class="w-20 h-20 bg-rose-50 text-rose-500 rounded-full flex items-center justify-center mx-auto mb-6">
                <i data-lucide="globe-2" class="w-10 h-10"></i>
            </div>
            <h2 class="text-2xl font-black text-slate-800 mb-3">Halaman Tidak Ditemukan</h2>
            <p class="text-slate-500 text-sm leading-relaxed">Website untuk domain ini belum diatur atau halaman telah dihapus.</p>
        </div>
    </div>

    <script src="/engine.js?v=cincin_100_final"></script>

</body>
</html>
