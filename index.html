<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memuat...</title>
    
    <link rel="icon" id="dynamic-favicon" href="data:,">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; margin: 0; padding: 0; }
        
        /* CSS Bawaan agar artikel di /blog tetap rapi, tapi tidak membatasi desain Canvas bos */
        .cms-content h1 { font-size: 2.25rem; font-weight: 800; margin-bottom: 1rem; color: #1e293b; line-height: 1.2; }
        .cms-content h2 { font-size: 1.875rem; font-weight: 800; margin-top: 2rem; margin-bottom: 1rem; color: #334155; line-height: 1.3;}
        .cms-content h3 { font-size: 1.5rem; font-weight: 700; margin-top: 1.5rem; margin-bottom: 0.75rem; color: #334155; }
        .cms-content p { margin-bottom: 1.25rem; color: #475569; line-height: 1.8; }
        .cms-content a { color: #4f46e5; font-weight: 700; text-decoration: underline; text-underline-offset: 4px; }
        .cms-content img { border-radius: 1rem; margin: 2rem 0; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); max-width: 100%; height: auto; }
        .cms-content b, .cms-content strong { font-weight: 800; color: #1e293b; }
        .cms-content i, .cms-content em { font-style: italic; }
    </style>
</head>
<body class="selection:bg-indigo-100 selection:text-indigo-900 w-full min-h-screen overflow-x-hidden">

    <div id="loading-spinner" class="fixed inset-0 bg-white z-[9999] flex flex-col items-center justify-center text-slate-400 transition-opacity duration-300">
        <svg class="w-12 h-12 mb-4 animate-spin text-indigo-500" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <p class="font-bold tracking-widest uppercase text-[10px] animate-pulse">Menyiapkan Canvas...</p>
    </div>

    <div id="error-box" class="hidden min-h-screen flex items-center justify-center p-4 bg-slate-50">
        <div class="bg-white border border-slate-200 rounded-[2rem] p-10 text-center w-full max-w-lg shadow-xl">
            <h2 class="text-rose-600 font-black text-4xl mb-2">404</h2>
            <p class="text-slate-500 font-medium text-sm mb-8">Halaman tidak ditemukan atau URL salah.</p>
            <a href="/" class="inline-block bg-slate-900 text-white px-8 py-4 rounded-xl font-bold text-xs uppercase hover:bg-slate-800 transition-colors">Kembali ke Beranda</a>
        </div>
    </div>

    <div id="app-canvas" class="w-full hidden opacity-0 transition-opacity duration-500"></div>

    <script src="/config.js?v=8"></script>
    <script src="/engine.js?v=8"></script>
</body>
</html>
