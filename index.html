<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memuat Website...</title>
    <link rel="preconnect" href="https://script.google.com">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link id="dynamic-favicon" rel="icon" type="image/x-icon" href="">
    <style>
        /* Animasi Spinner Premium */
        .spinner-core {
            width: 50px; height: 50px;
            border: 4px solid rgba(99, 102, 241, 0.1);
            border-radius: 50%;
            border-top-color: #6366f1;
            animation: spin 1s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50 m-0 p-0 overflow-x-hidden selection:bg-indigo-500 selection:text-white">
    
    <div id="loading-spinner" class="fixed inset-0 bg-white/80 backdrop-blur-md z-[999] flex flex-col items-center justify-center transition-all duration-500">
        <div class="bg-white p-8 rounded-[2rem] shadow-2xl shadow-indigo-100/50 flex flex-col items-center border border-white/50">
            <div class="spinner-core mb-6 shadow-inner"></div>
            <div class="text-indigo-600 font-black tracking-[0.2em] uppercase text-[10px] animate-pulse">Menyiapkan Sistem</div>
        </div>
    </div>

    <div id="app-canvas" class="w-full min-h-screen opacity-0 transition-opacity duration-700 hidden"></div>

    <div id="error-box" class="hidden min-h-screen flex flex-col items-center justify-center bg-slate-50 p-6">
        <div class="bg-white p-10 rounded-3xl shadow-xl text-center max-w-md border border-slate-100">
            <div class="w-20 h-20 bg-rose-50 text-rose-500 rounded-full flex items-center justify-center mx-auto mb-6">
                <i data-lucide="alert-triangle" class="w-10 h-10"></i>
            </div>
            <h2 class="text-2xl font-black text-slate-800 mb-3">Website Tidak Ditemukan</h2>
            <p class="text-slate-500 text-sm">Pastikan domain sudah terdaftar di sistem kami.</p>
        </div>
    </div>

    <script src="engine.js?v=saas_ngebut"></script>

</body>
</html>
