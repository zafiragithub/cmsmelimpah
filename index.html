<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memuat Website...</title> <link rel="icon" id="dynamic-favicon" href="data:,">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        
        /* MAGIC CSS: Ini untuk merapikan hasil ketikan dari Editor HTML Admin Anda */
        .cms-content h1 { font-size: 2.25rem; font-weight: 800; margin-bottom: 1rem; color: #1e293b; line-height: 1.2; }
        .cms-content h2 { font-size: 1.875rem; font-weight: 800; margin-top: 2rem; margin-bottom: 1rem; color: #334155; line-height: 1.3;}
        .cms-content h3 { font-size: 1.5rem; font-weight: 700; margin-top: 1.5rem; margin-bottom: 0.75rem; color: #334155; }
        .cms-content p { margin-bottom: 1.25rem; color: #475569; line-height: 1.8; }
        .cms-content a { color: #4f46e5; font-weight: 700; text-decoration: underline; text-underline-offset: 4px; }
        .cms-content a:hover { color: #3730a3; }
        .cms-content img { border-radius: 1rem; margin: 2rem 0; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); max-width: 100%; height: auto; }
        .cms-content ul { list-style-type: disc; margin-left: 1.5rem; margin-bottom: 1.25rem; color: #475569; }
        .cms-content ol { list-style-type: decimal; margin-left: 1.5rem; margin-bottom: 1.25rem; color: #475569; }
        .cms-content b, .cms-content strong { font-weight: 800; color: #1e293b; }
        .cms-content i, .cms-content em { font-style: italic; }
    </style>
</head>
<body class="bg-[#f8f9fa] flex flex-col min-h-screen selection:bg-indigo-100 selection:text-indigo-900">

    <header class="bg-white border-b border-slate-200 sticky top-0 z-50 shadow-sm">
        <div class="max-w-4xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="/" class="flex items-center gap-3 group">
                <img id="site-logo" src="" alt="Logo" class="h-10 w-auto hidden rounded-lg">
                <div>
                    <h1 id="site-name" class="font-black text-xl text-slate-800 tracking-tight group-hover:text-indigo-600 transition-colors">Web CMS</h1>
                    <p id="site-tagline" class="text-[9px] font-bold text-slate-400 uppercase tracking-widest hidden sm:block"></p>
                </div>
            </a>
            
            <nav class="hidden md:flex gap-8 text-sm font-bold text-slate-500 uppercase tracking-wider text-[11px]">
                <a href="/" class="hover:text-indigo-600 transition-colors">Beranda</a>
                </nav>
            <nav class="hidden md:flex gap-8 text-sm font-bold text-slate-500 uppercase tracking-wider text-[11px]">
                <a href="/" class="hover:text-indigo-600 transition-colors">Beranda</a>
                <a href="/blog" class="hover:text-indigo-600 transition-colors">Blog / Berita</a>
            </nav>
        </div>
    </header>

    <main class="flex-grow max-w-4xl mx-auto w-full px-4 sm:px-6 py-10 md:py-16">
        
        <div id="error-box" class="hidden bg-rose-50 border border-rose-100 rounded-[2rem] p-8 text-center mb-8">
            <h2 class="text-rose-600 font-black text-2xl mb-2">404 - Halaman Tidak Ditemukan</h2>
            <p class="text-rose-500 font-medium text-sm">Maaf, halaman yang Anda cari mungkin sudah dihapus atau URL-nya salah.</p>
            <a href="/" class="inline-block mt-6 bg-rose-600 text-white px-8 py-3 rounded-xl font-bold text-xs uppercase hover:bg-rose-700 transition-colors">Kembali ke Beranda</a>
        </div>

        <div id="app-content" class="bg-white p-8 md:p-14 rounded-[2.5rem] shadow-xl shadow-slate-200/50 border border-slate-100 min-h-[50vh] cms-content relative overflow-hidden">
            
            <div id="loading-spinner" class="absolute inset-0 bg-white flex flex-col items-center justify-center z-10 text-slate-400">
                <svg class="w-12 h-12 mb-4 animate-spin text-indigo-500" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <p class="font-bold tracking-widest uppercase text-[10px] animate-pulse">Menarik Data dari Server...</p>
            </div>

            <div id="page-body"></div>

        </div>
    </main>

    <footer class="bg-white border-t border-slate-200 mt-auto">
        <div class="max-w-4xl mx-auto px-6 py-8 text-center text-[11px] font-bold tracking-widest uppercase text-slate-400">
            &copy; <span id="current-year"></span> <span id="footer-site-name">Web CMS</span>. All rights reserved.
        </div>
    </footer>

    <script src="config.js?v=4"></script>
    <script src="engine.js?v=4"></script>
    <script>
        // Set tahun footer otomatis
        document.getElementById('current-year').textContent = new Date().getFullYear();
    </script>
</body>
</html>
