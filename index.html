<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link id="dynamic-favicon" rel="icon" type="image/x-icon" href="">
</head>
<body class="bg-slate-50 m-0 p-0 overflow-x-hidden">
    
    <div id="loading-spinner" class="fixed inset-0 bg-white z-[999] flex flex-col items-center justify-center transition-opacity duration-300">
        <div class="relative w-20 h-20">
            <div class="absolute inset-0 border-4 border-slate-100 rounded-full"></div>
            <div class="absolute inset-0 border-4 border-indigo-600 rounded-full border-t-transparent animate-spin"></div>
        </div>
        <div class="mt-6 text-indigo-600 font-black tracking-widest uppercase text-sm animate-pulse">Menyiapkan Halaman...</div>
    </div>

    <div id="app-canvas" class="w-full min-h-screen opacity-0 transition-opacity duration-500 hidden"></div>

    <div id="error-box" class="hidden min-h-screen flex flex-col items-center justify-center bg-slate-50 p-6">
        <div class="bg-white p-10 rounded-3xl shadow-xl text-center max-w-md border border-slate-100">
            <div class="w-20 h-20 bg-rose-50 text-rose-500 rounded-full flex items-center justify-center mx-auto mb-6">
                <i data-lucide="alert-triangle" class="w-10 h-10"></i>
            </div>
            <h2 class="text-2xl font-black text-slate-800 mb-3">Website Tidak Ditemukan</h2>
            <p class="text-slate-500 text-sm">Pastikan domain sudah terdaftar atau URL yang Anda masukkan benar.</p>
        </div>
    </div>

    <script src="engine.js?v=saas1"></script>

</body>
</html>
