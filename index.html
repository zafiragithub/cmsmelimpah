<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memuat Website...</title>
    
    <link rel="preconnect" href="https://script.google.com">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link id="dynamic-favicon" rel="icon" type="image/x-icon" href="">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-font-smoothing: antialiased; }
        /* Tidak pakai CSS custom untuk layout agar Tailwind berfungsi sempurna */
    </style>
</head>
<body class="bg-slate-50 m-0 p-0 overflow-x-hidden selection:bg-indigo-500 selection:text-white">
    
    <div id="loading-spinner" class="fixed inset-0 bg-white z-[999] flex flex-col items-center justify-center transition-opacity duration-300">
        <div class="relative w-16 h-16 mb-4">
            <div class="absolute inset-0 border-4 border-slate-100 rounded-full"></div>
            <div class="absolute inset-0 border-4 border-indigo-600 rounded-full border-t-transparent animate-spin"></div>
        </div>
        <div class="text-xs font-bold text-slate-400 tracking-widest uppercase animate-pulse">Memuat...</div>
    </div>

    <div id="app-canvas" class="w-full min-h-screen opacity-0 transition-opacity duration-300 hidden"></div>

    <div id="error-box" class="hidden min-h-screen flex flex-col items-center justify-center bg-slate-50 p-6">
        <div class="bg-white p-10 rounded-[2rem] shadow-xl text-center max-w-md border border-slate-100">
            <div class="w-20 h-20 bg-rose-50 text-rose-500 rounded-full flex items-center justify-center mx-auto mb-6">
                <i data-lucide="globe-2" class="w-10 h-10"></i>
            </div>
            <h2 class="text-2xl font-black text-slate-800 mb-3">Domain Belum Aktif</h2>
            <p class="text-slate-500 text-sm leading-relaxed">Website untuk domain ini tidak ditemukan atau sedang dalam proses pengaturan.</p>
        </div>
    </div>

    <script src="engine.js?v=fix_cincin"></script>

</body>
</html>
