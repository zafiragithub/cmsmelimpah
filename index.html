<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memuat...</title>
    
    <link rel="icon" id="dynamic-favicon" href="data:,">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; margin: 0; padding: 0; }
        
        /* CSS Bawaan untuk menjaga format CMS tetap rapi */
        .cms-content h1 { font-size: 2.25rem; font-weight: 800; margin-bottom: 1rem; color: #1e293b; line-height: 1.2; }
        .cms-content h2 { font-size: 1.875rem; font-weight: 800; margin-top: 2rem; margin-bottom: 1rem; color: #334155; line-height: 1.3;}
        .cms-content h3 { font-size: 1.5rem; font-weight: 700; margin-top: 1.5rem; margin-bottom: 0.75rem; color: #334155; }
        .cms-content p { margin-bottom: 1.25rem; color: #475569; line-height: 1.8; }
        .cms-content a { color: #4f46e5; font-weight: 700; text-decoration: underline; text-underline-offset: 4px; }
        .cms-content img { border-radius: 1rem; margin: 2rem 0; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); max-width: 100%; height: auto; }
        .cms-content b, .cms-content strong { font-weight: 800; color: #1e293b; }
        .cms-content i, .cms-content em { font-style: italic; }
    </style>
</head>
<body class="selection:bg-indigo-100 selection:text-indigo-900 w-full min-h-screen overflow-x-hidden">

    <div id="loading-spinner" class="fixed inset-0 bg-[#f8fafc] z-[9999] flex flex-col items-center justify-center transition-opacity duration-500">
        
        <div class="relative w-16 h-16 flex items-center justify-center mb-6">
            <div class="absolute inset-0 rounded-full border-t-2 border-indigo-600 animate-spin"></div>
            <div class="absolute inset-2 rounded-full border-b-2 border-rose-500 animate-spin" style="animation-direction: reverse; animation-duration: 0.8s;"></div>
            <div class="w-4 h-4 bg-slate-800 rounded-full animate-pulse"></div>
        </div>
        
        <div class="text-center">
            <h3 class="text-sm font-black text-slate-800 tracking-[0.2em] uppercase mb-2">Memuat Halaman</h3>
            <p class="text-[10px] font-bold text-slate-400 tracking-widest uppercase animate-pulse">Harap Tunggu Sebentar...</p>
        </div>

    </div>

    <div id="error-box" class="hidden min-h-screen flex items-center justify-center p-4 bg-slate-50">
        <div class="bg-white border border-slate-200 rounded-[2rem] p-10 text-center w-full max-w-lg shadow-xl">
            <div class="w-20 h-20 bg-rose-50 text-rose-500 rounded-full flex items-center justify-center mx-auto mb-6">
                <i data-lucide="alert-triangle" class="w-10 h-10"></i>
            </div>
            <h2 class="text-slate-900 font-black text-3xl mb-2">Halaman Tidak Ditemukan</h2>
            <p class="text-slate-500 font-medium text-sm mb-8">Maaf, tautan yang Anda tuju mungkin rusak atau halaman telah dihapus.</p>
            <a href="/" class="inline-flex items-center justify-center gap-2 w-full bg-slate-900 text-white px-8 py-4 rounded-xl font-bold text-xs uppercase tracking-widest hover:bg-slate-800 transition-colors">
                <i data-lucide="arrow-left" class="w-4 h-4"></i> Kembali ke Beranda
            </a>
        </div>
    </div>

    <div id="app-canvas" class="w-full hidden opacity-0 transition-opacity duration-500"></div>

    <script src="/config.js?v=14"></script>
    <script src="/engine.js?v=14"></script>
    
</body>
</html>
